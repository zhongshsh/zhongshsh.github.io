<script>
const pubContainer = document.getElementById('pub-container');
PUBLICATIONS_DATA.forEach(item => {
    const award = item.award ? ` <span class="award">${item.award}</span>` : '';
    pubContainer.innerHTML += `
        <div class="pub-item">
            <img src="${item.img}" alt="${item.title}" width="80px">
            <div class="pub-info">
                <p class="pub-title">${item.title} <a href="${item.link}" aria-label="Link to publication"><i class="fa-solid fa-paperclip"></i></a></p>
                <p class="pub-authors">${item.authors}</p>
                <p class="pub-venue">${item.venue}${award}</p>
            </div>
        </div>`;
});
