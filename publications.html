<script>
const container = document.getElementById('all-publications');
let currentYear = null;
ALL_PUBLICATIONS_DATA.forEach(item => {
    if (item.year !== currentYear) {
        currentYear = item.year;
        container.insertAdjacentHTML('beforeend', `<h3 class="pub-year">${currentYear}</h3><div class="pub-container" data-year="${currentYear}"></div>`);
    }
    const yearContainer = container.querySelector(`[data-year="${currentYear}"]`);
    const award = item.award
        ? item.awardUrl
            ? ` <a class="award" href="${item.awardUrl}" target="_blank">${item.award}</a>`
            : ` <span class="award">${item.award}</span>`
        : '';
    const links = (item.links || []).filter(link => link && link.url);
    const linksHtml = links.length
        ? `<p class="pub-links">${links.map(link => `<a href="${link.url}" target="_blank">${link.label}</a>`).join('')}</p>`
        : '';
    const imageHtml = item.img
        ? `<img src="${item.img}" alt="Preview for ${item.title}" loading="lazy">`
        : `<div class="pub-image-placeholder" aria-hidden="true"><i class="fas fa-file-lines"></i></div>`;
    yearContainer.insertAdjacentHTML('beforeend', `
        <div class="pub-item">
            ${imageHtml}
            <div class="pub-info">
                <p class="pub-title">${item.title}</p>
                <p class="pub-authors">${item.authors}</p>
                <div class="pub-meta">
                    <p class="pub-venue">${item.venue}${award}</p>
                    ${linksHtml}
                </div>
            </div>
        </div>`);
});
</script>
