<script>
// ---- Upcoming ----
const upcoming = document.getElementById('events-upcoming');
if (EVENTS_DATA.length === 0) {
    upcoming.innerHTML = `<tr><td style="color:var(--text-muted);">No upcoming events right now. Check back soon!</td></tr>`;
} else {
    EVENTS_DATA.forEach(item => {
        upcoming.innerHTML += `<tr><th>${item.date}</th><td>${item.text}</td></tr>`;
    });
}

// ---- Past events ----
const TAG_META = {
    talk:     { cls: 'talk',     label: '🎤 Talk' },
    poster:   { cls: 'poster',   label: '📌 Poster' },
    attended: { cls: 'attended', label: '📍 Attended' },
};

function renderPastEvent(item) {
    const t = TAG_META[item.type] || TAG_META.attended;
    const tag = `<span class="ev-tag ${t.cls}">${t.label}</span>`;
    const title = item.title ? `<b>“${item.title}”</b> ` : '';
    const venue = item.venue ? `${item.title ? '@ ' : ''}${item.venue}` : '';
    const loc = item.location ? `<span class="ev-loc">, ${item.location}</span>` : '';
    const links = (item.links || [])
        .filter(l => l && l.url)
        .map(l => `<a href="${l.url}" target="_blank">${l.label}</a>`)
        .join('');
    const linksHtml = links ? ` <span class="ev-links">${links}</span>` : '';
    const note = item.note ? `<span class="ev-note">${item.note}</span>` : '';
    return `<tr><th>${item.date}</th><td>${tag}${title}${venue}${loc}${linksHtml}${note}</td></tr>`;
}

const PAST_RECENT_COUNT = 5;
const pastRecent = document.getElementById('events-past-recent');
const pastOlder = document.getElementById('events-past-older');
PAST_EVENTS_DATA.forEach((item, i) => {
    const row = renderPastEvent(item);
    if (i < PAST_RECENT_COUNT) {
        pastRecent.innerHTML += row;
    } else {
        pastOlder.innerHTML += row;
    }
});
// Hide the "Older" toggle when there is nothing folded away.
if (PAST_EVENTS_DATA.length <= PAST_RECENT_COUNT) {
    document.getElementById('events-past-older-wrap').style.display = 'none';
}
if (PAST_EVENTS_DATA.length === 0) {
    pastRecent.innerHTML = `<tr><td style="color:var(--text-muted);">Coming soon.</td></tr>`;
}
</script>
